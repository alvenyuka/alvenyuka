  <text x="640" y="185" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="24" font-weight="400" fill="#ffffff" text-anchor="middle" opacity="0.95">Data Scientist  |  Development Finance  |  Fraud Detection  |  Risk Analyst</text>
