<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Alven Yuka - Data Scientist, Development Finance, Fraud Detection, Risk Analyst">
  <defs>
